<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1650" viewBox="0 0 1240 1650">
  <!-- paper -->
  <rect width="1240" height="1650" fill="#f6efdd"/>
  <rect width="1240" height="1650" fill="#efe5cc" opacity="0.35"/>
  <!-- shadow at spine (left) -->
  <rect x="0" y="0" width="60" height="1650" fill="#d8ccae" opacity="0.5"/>
  <!-- ruled lines -->
  <g stroke="#a8b8cf" stroke-width="2" opacity="0.75">
    <line x1="40" y1="260" x2="1215" y2="262"/>
    <line x1="40" y1="352" x2="1215" y2="354"/>
    <line x1="40" y1="444" x2="1215" y2="446"/>
    <line x1="40" y1="536" x2="1215" y2="538"/>
    <line x1="40" y1="628" x2="1215" y2="630"/>
    <line x1="40" y1="720" x2="1215" y2="722"/>
    <line x1="40" y1="812" x2="1215" y2="814"/>
    <line x1="40" y1="904" x2="1215" y2="906"/>
    <line x1="40" y1="996" x2="1215" y2="998"/>
    <line x1="40" y1="1088" x2="1215" y2="1090"/>
    <line x1="40" y1="1180" x2="1215" y2="1182"/>
    <line x1="40" y1="1272" x2="1215" y2="1274"/>
    <line x1="40" y1="1364" x2="1215" y2="1366"/>
    <line x1="40" y1="1456" x2="1215" y2="1458"/>
    <line x1="40" y1="1548" x2="1215" y2="1550"/>
  </g>
  <!-- red margin -->
  <line x1="150" y1="30" x2="146" y2="1630" stroke="#c34a3a" stroke-width="3" opacity="0.8"/>
  <!-- punch holes -->
  <circle cx="75" cy="420" r="16" fill="#e2d7bd" stroke="#c9bc9c" stroke-width="3"/>
  <circle cx="75" cy="1230" r="16" fill="#e2d7bd" stroke="#c9bc9c" stroke-width="3"/>

  <!-- handwriting -->
  <g font-family="Devanagari MT, Kohinoor Devanagari, Bradley Hand, Marker Felt, cursive" fill="#233468">
    <g transform="rotate(-0.6 620 200)">
      <text x="240" y="150" font-size="58" fill="#1c2c5e">उधार खाता — कुमार किराना स्टोर</text>
      <text x="440" y="225" font-size="42" fill="#44548a">जुलाई 2026 — पेज 1</text>
      <line x1="240" y1="245" x2="1000" y2="243" stroke="#233468" stroke-width="3"/>
    </g>

    <g transform="rotate(0.4 620 330)">
      <text x="60" y="335" font-size="40">2/7</text>
      <text x="175" y="337" font-size="44">रमेश यादव — आटा 10kg × 2</text>
      <text x="880" y="335" font-size="46">₹920 उधार</text>
    </g>

    <g transform="rotate(-0.5 620 425)" font-family="Bradley Hand, Marker Felt, Comic Sans MS, cursive">
      <text x="60" y="428" font-size="38">2/7</text>
      <text x="175" y="430" font-size="42">Sunita Devi — tel 1L x3</text>
      <text x="880" y="428" font-size="44">540 udhaar</text>
    </g>

    <g transform="rotate(0.3 620 515)">
      <text x="60" y="520" font-size="40">3/7</text>
      <text x="175" y="522" font-size="44">रमेश यादव — जमा</text>
      <text x="880" y="520" font-size="46" fill="#1e5b38">₹500 जमा</text>
    </g>

    <g transform="rotate(-0.4 620 610)" font-family="Bradley Hand, Marker Felt, Comic Sans MS, cursive">
      <text x="60" y="612" font-size="38">3/7</text>
      <text x="175" y="614" font-size="42">Anand Traders — chawal 25kg bag x5</text>
      <text x="905" y="612" font-size="44">= 6250</text>
      <text x="1030" y="655" font-size="34" fill="#44548a">udhaar</text>
    </g>

    <g transform="rotate(0.6 620 705)" font-family="Telugu MT, Kohinoor Telugu, sans-serif">
      <text x="60" y="706" font-size="38" font-family="Devanagari MT, sans-serif">4/7</text>
      <text x="175" y="708" font-size="42">లక్ష్మి జనరల్ — సబ్బు పెట్టె × 4</text>
      <text x="905" y="706" font-size="44">₹8</text>
    </g>
    <!-- smudge over the amount -->
    <ellipse cx="975" cy="692" rx="72" ry="30" fill="#3a3a3a" opacity="0.55" transform="rotate(-4 975 692)"/>
    <ellipse cx="1000" cy="700" rx="45" ry="20" fill="#2a2a2a" opacity="0.45"/>

    <g transform="rotate(-0.3 620 795)" font-family="Bradley Hand, Marker Felt, Comic Sans MS, cursive">
      <text x="60" y="798" font-size="38">4/7</text>
      <text x="175" y="800" font-size="42">Sunita Devi — full jama</text>
      <text x="880" y="798" font-size="44" fill="#1e5b38">540 ✓</text>
    </g>

    <!-- crossed-out mistake -->
    <g transform="rotate(0.5 620 890)">
      <text x="175" y="892" font-size="42" opacity="0.8">गोपाल — चाय पत्ती</text>
      <line x1="165" y1="878" x2="640" y2="874" stroke="#233468" stroke-width="4"/>
      <text x="660" y="890" font-size="34" fill="#44548a">(गलती)</text>
    </g>

    <!-- margin totals doodle -->
    <g font-size="32" fill="#6b7280" transform="rotate(-2 90 1000)" font-family="Bradley Hand, cursive">
      <text x="52" y="1000">920</text>
      <text x="52" y="1042">+540</text>
      <line x1="48" y1="1056" x2="140" y2="1056" stroke="#6b7280" stroke-width="2"/>
      <text x="52" y="1092">1460</text>
    </g>
  </g>

  <!-- tea stain -->
  <circle cx="1080" cy="1380" r="85" fill="none" stroke="#b98d4f" stroke-width="10" opacity="0.25"/>
  <circle cx="1080" cy="1380" r="70" fill="#c9a05e" opacity="0.12"/>
</svg>
