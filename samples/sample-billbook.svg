      <text x="225" y="710" font-size="42">बासमती चावल 10kg</text>
      <text x="745" y="708" font-size="40" font-family="Bradley Hand, cursive">2</text>
      <text x="905" y="708" font-size="42" font-family="Bradley Hand, cursive">1840</text>
    </g>
    <g transform="rotate(0.5 620 790)" font-family="Bradley Hand, Marker Felt, cursive">
      <text x="95" y="798" font-size="38">105</text>
      <text x="225" y="800" font-size="40">Maggi box + ketchup</text>
      <text x="745" y="798" font-size="40">6+1</text>
