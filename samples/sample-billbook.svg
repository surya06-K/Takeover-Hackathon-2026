  <text x="620" y="180" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="28" fill="#8a2f23">CASH / CREDIT MEMO — Ph: 98xxxxxx21</text>
  <!-- printed table -->
  <g stroke="#b04a3c" stroke-width="2.5" opacity="0.9">
    <line x1="70" y1="300" x2="1170" y2="300"/>
    <line x1="70" y1="380" x2="1170" y2="380"/>
    <line x1="70" y1="470" x2="1170" y2="470"/>
    <line x1="70" y1="560" x2="1170" y2="560"/>
    <line x1="70" y1="650" x2="1170" y2="650"/>
    <line x1="70" y1="740" x2="1170" y2="740"/>
    <line x1="70" y1="830" x2="1170" y2="830"/>
    <line x1="70" y1="920" x2="1170" y2="920"/>
    <line x1="70" y1="1010" x2="1170" y2="1010"/>
    <line x1="70" y1="300" x2="70" y2="1010"/>
    <line x1="200" y1="300" x2="200" y2="1010"/>
