      <text x="225" y="440" font-size="40">Parle-G carton</text>
      <text x="745" y="438" font-size="40">12</text>
      <text x="905" y="438" font-size="42">720/-</text>
    </g>
    <g transform="rotate(-0.5 620 520)" font-family="Devanagari MT, Kohinoor Devanagari, cursive">
      <text x="95" y="528" font-size="38" font-family="Bradley Hand, cursive">102</text>
      <text x="225" y="530" font-size="42">सरसों तेल 5L</text>
      <text x="745" y="528" font-size="40" font-family="Bradley Hand, cursive">1</text>
      <text x="905" y="528" font-size="42" font-family="Bradley Hand, cursive">890</text>
    </g>
    <g transform="rotate(0.3 620 610)" font-family="Bradley Hand, Marker Felt, cursive">
      <text x="95" y="618" font-size="38">103</text>
