      <text x="745" y="618" font-size="40">4</text>
      <text x="905" y="618" font-size="42">560/-</text>
    </g>
    <g transform="rotate(-0.4 620 700)" font-family="Devanagari MT, Kohinoor Devanagari, cursive">
