  <!-- signature -->
  <text x="920" y="1120" font-family="Bradley Hand, cursive" font-size="40" fill="#233468" transform="rotate(-4 920 1120)">Ganesh ✍</text>
  <!-- stamp -->
  <g transform="rotate(-8 300 1150)" opacity="0.5">
    <ellipse cx="300" cy="1150" rx="150" ry="70" fill="none" stroke="#3b5bab" stroke-width="4"/>
    <text x="300" y="1140" text-anchor="middle" font-family="Helvetica" font-size="26" fill="#3b5bab">SHRI GANESH</text>
    <text x="300" y="1175" text-anchor="middle" font-family="Helvetica" font-size="22" fill="#3b5bab">GENERAL STORE</text>
  </g>
