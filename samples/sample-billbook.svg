      <text x="890" y="985" font-size="48" fill="#1c2c5e">₹4505/-</text>
      <line x1="880" y1="1000" x2="1120" y2="996" stroke="#1c2c5e" stroke-width="3"/>
      <line x1="880" y1="1006" x2="1120" y2="1002" stroke="#1c2c5e" stroke-width="3"/>
    </g>
